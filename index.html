<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>주간 작업 현황표</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f7f7f5; --bg-info: #e6f1fb;
    --text-primary: #1a1a18; --text-secondary: #6b6b68; --text-tertiary: #9e9e9b;
    --text-info: #185fa5; --border: rgba(0,0,0,0.12); --border-hover: rgba(0,0,0,0.25);
    --radius-md: 8px; --radius-lg: 12px;
    --green-fill: #C0DD97; --green-border: #639922; --green-text: #27500A;
    --red-fill: #F7C1C1; --red-border: #E24B4A; --red-text: #791F1F;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c; --bg-secondary: #2a2a28; --bg-info: #0c2a4a;
      --text-primary: #e8e8e4; --text-secondary: #9e9e9a; --text-tertiary: #6a6a67;
      --text-info: #85b7eb; --border: rgba(255,255,255,0.1); --border-hover: rgba(255,255,255,0.22);
      --green-fill: #27500A; --green-border: #639922; --green-text: #C0DD97;
      --red-fill: #501313; --red-border: #E24B4A; --red-text: #F7C1C1;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif; background: var(--bg-secondary); color: var(--text-primary); min-height: 100vh; }

  /* 모드 선택 화면 */
  .mode-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 16px; padding: 24px;
  }
  .mode-title { font-size: 16px; font-weight: 500; color: var(--text-primary); margin-bottom: 8px; }
  .mode-buttons { display: flex; gap: 10px; }
  .mode-btn {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 20px 28px; border-radius: var(--radius-lg);
    border: 0.5px solid var(--border-hover); background: var(--bg);
    cursor: pointer; font-family: inherit; transition: background 0.15s, border-color 0.15s;
    min-width: 130px;
  }
  .mode-btn:hover { background: var(--bg-secondary); border-color: var(--border-hover); }
  .mode-btn i { font-size: 22px; color: var(--text-secondary); }
  .mode-btn span { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .mode-btn small { font-size: 11px; color: var(--text-tertiary); }

  /* 비밀번호 입력 */
  .pw-screen {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 12px; padding: 24px;
  }
  .pw-screen.visible { display: flex; }
  .pw-label { font-size: 13px; color: var(--text-secondary); }
  .pw-row { display: flex; gap: 8px; }
  .pw-input {
    font-size: 14px; padding: 8px 12px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-hover); background: var(--bg);
    color: var(--text-primary); outline: none; font-family: inherit; width: 180px;
  }
  .pw-input:focus { border-color: var(--text-info); }
  .pw-submit {
    font-size: 13px; padding: 8px 14px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border-hover); background: var(--bg);
    color: var(--text-primary); cursor: pointer; font-family: inherit;
    transition: background 0.12s;
  }
  .pw-submit:hover { background: var(--bg-secondary); }
  .pw-error { font-size: 12px; color: #A32D2D; display: none; }
  .pw-error.visible { display: block; }
  .pw-back { font-size: 12px; color: var(--text-tertiary); background: none; border: none; cursor: pointer; margin-top: 4px; }

  /* 메인 앱 */
  .app { display: none; padding: 20px 16px 40px; }
  .app.visible { display: block; }

  .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .app-title { font-size: 15px; font-weight: 500; }
  .sync-status { font-size: 11px; color: var(--text-tertiary); display: flex; align-items: center; gap: 4px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #639922; }
  .sync-dot.offline { background: #E24B4A; }
  .mode-badge {
    font-size: 11px; padding: 2px 8px; border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
  }
  .mode-badge.edit { background: var(--bg-info); color: var(--text-info); border-color: rgba(23,93,185,0.2); }
  .mode-badge.view { background: var(--bg-secondary); color: var(--text-tertiary); }
  .week-nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .week-nav button { width: 28px; height: 28px; border-radius: var(--radius-md); border: 0.5px solid var(--border-hover); background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 14px; transition: background 0.15s; }
  .week-nav button:hover { background: var(--bg-secondary); }
  .week-label { font-size: 13px; font-weight: 500; min-width: 148px; text-align: center; }
  .add-client-btn { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-secondary); border: 0.5px dashed var(--border-hover); border-radius: var(--radius-md); background: transparent; padding: 5px 12px; cursor: pointer; transition: background 0.12s; }
  .add-client-btn:hover { background: var(--bg); }
  .logout-btn { font-size: 11px; color: var(--text-tertiary); background: none; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 4px 8px; cursor: pointer; }
  .change-pw-btn { font-size: 11px; color: var(--text-tertiary); background: none; border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 4px 8px; cursor: pointer; }

  .client-block { margin-bottom: 14px; border: 0.5px solid var(--border); border-radius: var(--radius-lg); background: var(--bg); overflow: hidden; }
  .client-header { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; background: var(--bg-secondary); border-bottom: 0.5px solid var(--border); }
  .client-name-area { display: flex; align-items: center; gap: 8px; }
  .client-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .client-name { font-size: 13px; font-weight: 500; color: var(--text-primary); border: none; background: transparent; outline: none; min-width: 60px; max-width: 200px; }
  .client-name.editable { cursor: text; }
  .client-name.editable:focus { background: var(--bg); border-radius: 4px; padding: 1px 5px; }
  .client-actions { display: flex; gap: 6px; align-items: center; }
  .small-btn { font-size: 11px; color: var(--text-secondary); border: 0.5px solid var(--border); border-radius: var(--radius-md); background: transparent; padding: 3px 8px; cursor: pointer; display: flex; align-items: center; gap: 3px; transition: background 0.1s; }
  .small-btn:hover { background: var(--bg-secondary); }
  .del-client-btn { font-size: 11px; color: var(--text-tertiary); border: none; background: none; cursor: pointer; padding: 3px 5px; border-radius: var(--radius-md); }
  .del-client-btn:hover { background: #FCEBEB; color: #A32D2D; }
  .overflow-wrapper { overflow-x: auto; }
  .task-grid { display: grid; grid-template-columns: 160px repeat(7, 1fr); font-size: 12px; min-width: 620px; }
  .col-header-spacer { padding: 6px 12px; border-bottom: 0.5px solid var(--border); font-size: 11px; color: var(--text-tertiary); }
  .day-header-cell { padding: 5px 4px 6px; text-align: center; border-bottom: 0.5px solid var(--border); border-left: 0.5px solid var(--border); }
  .day-name { font-size: 10px; font-weight: 500; color: var(--text-tertiary); display: block; }
  .day-num { font-size: 13px; font-weight: 500; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; width: 22px; height: 22px; margin: 2px auto 0; border-radius: 50%; }
  .day-header-cell.today .day-name { color: var(--text-info); }
  .day-header-cell.today .day-num { background: var(--bg-info); color: var(--text-info); }
  .task-label-cell { grid-column: 1; display: flex; flex-direction: column; justify-content: center; padding: 8px 10px 8px 12px; border-bottom: 0.5px solid var(--border); grid-row: span 2; }
  .task-label-cell.last { border-bottom: none; }
  .task-title-row { display: flex; align-items: center; gap: 4px; }
  .task-title-input { font-size: 12px; color: var(--text-primary); border: none; background: transparent; outline: none; width: 100%; font-family: inherit; }
  .task-title-input.editable { cursor: text; }
  .task-title-input.editable:focus { background: var(--bg-secondary); border-radius: 3px; padding: 1px 4px; }
  .del-task-btn { font-size: 10px; color: var(--text-tertiary); background: none; border: none; cursor: pointer; padding: 1px 2px; border-radius: 3px; opacity: 0; flex-shrink: 0; }
  .task-label-cell:hover .del-task-btn { opacity: 1; }
  .del-task-btn:hover { color: #A32D2D; }
  .sub-badges { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 500; white-space: nowrap; border: 0.5px solid var(--border); background: var(--bg-secondary); color: var(--text-tertiary); }
  .badge-video.active { background: var(--green-fill); color: var(--green-text); border-color: var(--green-border); }
  .badge-yt.active { background: var(--red-fill); color: var(--red-text); border-color: var(--red-border); }
  .check-cell { border-left: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 5px 3px 4px; }
  .check-cell.last { border-bottom: none; }
  .check-cell.today-col { background: rgba(23,93,185,0.03); }
  .check-icon { width: 18px; height: 18px; border-radius: 4px; border: 0.5px solid var(--border-hover); background: transparent; display: flex; align-items: center; justify-content: center; transition: background 0.12s; flex-shrink: 0; user-select: none; }
  .check-icon.editable { cursor: pointer; }
  .check-icon.editable:hover { background: var(--bg-secondary); }
  .check-icon i { font-size: 11px; display: none; }
  .check-icon.cv i, .check-icon.cy i { display: block; }
  .check-icon.cv { background: var(--green-fill); border-color: var(--green-border); }
  .check-icon.cv i { color: var(--green-text); }
  .check-icon.cy { background: var(--red-fill); border-color: var(--red-border); }
  .check-icon.cy i { color: var(--red-text); }
  .memo-input { width: 100%; font-size: 12px; color: var(--text-secondary); border: none; border-top: 0.5px solid var(--border); background: transparent; outline: none; padding: 3px 2px 1px; font-family: inherit; resize: none; min-height: 20px; line-height: 1.4; text-align: center; overflow: hidden; }
  .memo-input::placeholder { color: var(--text-tertiary); font-size: 11px; }
  .memo-input.editable:focus { background: var(--bg-secondary); border-radius: 2px; }
  .memo-input.has-memo { color: var(--text-primary); font-weight: 500; }
  .legend { display: flex; align-items: center; gap: 14px; margin-top: 14px; padding-top: 12px; border-top: 0.5px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); }
  .legend-box { width: 11px; height: 11px; border-radius: 3px; }
  .loading { text-align: center; padding: 40px; color: var(--text-tertiary); font-size: 13px; }

  /* 비밀번호 변경 모달 */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.visible { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 24px; width: 300px; display: flex; flex-direction: column; gap: 12px; }
  .modal-title { font-size: 14px; font-weight: 500; }
  .modal-input { font-size: 13px; padding: 7px 10px; border-radius: var(--radius-md); border: 0.5px solid var(--border-hover); background: var(--bg-secondary); color: var(--text-primary); outline: none; font-family: inherit; width: 100%; }
  .modal-input:focus { border-color: var(--text-info); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn { font-size: 12px; padding: 6px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border-hover); background: var(--bg); color: var(--text-primary); cursor: pointer; font-family: inherit; transition: background 0.12s; }
  .modal-btn:hover { background: var(--bg-secondary); }
  .modal-btn.primary { background: var(--bg-info); color: var(--text-info); border-color: rgba(23,93,185,0.3); }
  .modal-err { font-size: 11px; color: #A32D2D; display: none; }
  .modal-err.visible { display: block; }
</style>
</head>
<body>

<!-- 모드 선택 -->
<div class="mode-screen" id="mode-screen">
  <span class="mode-title">접속 방식을 선택하세요</span>
  <div class="mode-buttons">
    <button class="mode-btn" id="btn-edit">
      <i class="ti ti-pencil"></i>
      <span>수정하기</span>
      <small>비밀번호 필요</small>
    </button>
    <button class="mode-btn" id="btn-view">
      <i class="ti ti-eye"></i>
      <span>열람만 하기</span>
      <small>바로 접속</small>
    </button>
  </div>
</div>

<!-- 비밀번호 입력 -->
<div class="pw-screen" id="pw-screen">
  <span class="pw-label">수정 비밀번호를 입력하세요</span>
  <div class="pw-row">
    <input class="pw-input" id="pw-input" type="password" placeholder="비밀번호" />
    <button class="pw-submit" id="pw-submit">확인</button>
  </div>
  <span class="pw-error" id="pw-error">비밀번호가 틀렸습니다</span>
  <button class="pw-back" id="pw-back">← 돌아가기</button>
</div>

<!-- 메인 앱 -->
<div class="app" id="app">
  <div class="top-bar">
    <span class="app-title">📋 주간 작업 현황</span>
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">연결 중...</span>
    </div>
    <span class="mode-badge" id="mode-badge"></span>
    <div class="week-nav">
      <button id="prev-btn"><i class="ti ti-chevron-left"></i></button>
      <span class="week-label" id="week-label"></span>
      <button id="next-btn"><i class="ti ti-chevron-right"></i></button>
    </div>
    <button class="change-pw-btn" id="change-pw-btn" style="display:none;">비밀번호 변경</button>
    <button class="add-client-btn" id="add-client-btn" style="display:none;">
      <i class="ti ti-plus" style="font-size:12px;"></i> 클라이언트 추가
    </button>
    <button class="logout-btn" id="logout-btn">나가기</button>
  </div>
  <div id="board"><div class="loading">데이터 불러오는 중...</div></div>
  <div class="legend">
    <span style="font-size:11px;color:var(--text-tertiary);">범례</span>
    <div class="legend-item"><div class="legend-box" style="background:var(--green-fill);border:0.5px solid var(--green-border);"></div>영상제작완료</div>
    <div class="legend-item"><div class="legend-box" style="background:var(--red-fill);border:0.5px solid var(--red-border);"></div>유튜브업로드완료</div>
  </div>
</div>

<!-- 비밀번호 변경 모달 -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal">
    <span class="modal-title">비밀번호 변경</span>
    <input class="modal-input" id="modal-cur" type="password" placeholder="현재 비밀번호" />
    <input class="modal-input" id="modal-new" type="password" placeholder="새 비밀번호" />
    <input class="modal-input" id="modal-confirm" type="password" placeholder="새 비밀번호 확인" />
    <span class="modal-err" id="modal-err"></span>
    <div class="modal-actions">
      <button class="modal-btn" id="modal-cancel">취소</button>
      <button class="modal-btn primary" id="modal-save">변경</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7xOzi7wuaJkmP2FNAKZTZr1lHYAMn8Ec",
  authDomain: "weekly-board-4c870.firebaseapp.com",
  databaseURL: "https://weekly-board-4c870-default-rtdb.firebaseio.com",
  projectId: "weekly-board-4c870",
  storageBucket: "weekly-board-4c870.firebasestorage.app",
  messagingSenderId: "954997789363",
  appId: "1:954997789363:web:5f241e872a775b549f56c6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, 'board');
const pwRef = ref(db, 'config/pw');

const DAYS = ['월','화','수','목','금','토','일'];
const COLORS = ['#378ADD','#1D9E75','#D85A30','#7F77DD','#BA7517','#D4537E'];
const DEFAULT_PW = '``1`1`';

const DEFAULT_STATE = {
  clients: [
    { id:'c1', name:'케이닥 꿀곰', tasks:[
      {id:'t1',title:'꿀곰 쇼츠',vchecks:{},ychecks:{},vmemos:{},ymemos:{}},
      {id:'t2',title:'야옹s SOS',vchecks:{},ychecks:{},vmemos:{},ymemos:{}}
    ]},
    { id:'c2', name:'씽크바이오 마린이', tasks:[
      {id:'t3',title:'마린이 쇼츠',vchecks:{},ychecks:{},vmemos:{},ymemos:{}}
    ]},
    { id:'c3', name:'클라이언트 C', tasks:[
      {id:'t5',title:'신규 영상',vchecks:{},ychecks:{},vmemos:{},ymemos:{}}
    ]}
  ]
};

function getMonday(d){const day=d.getDay(),diff=day===0?-6:1-day,r=new Date(d);r.setDate(d.getDate()+diff);r.setHours(0,0,0,0);return r;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtWeek(mon){return `${mon.getFullYear()}년 ${mon.getMonth()+1}월 ${mon.getDate()}일 주`;}
function dateKey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

const today=new Date();today.setHours(0,0,0,0);
let weekStart=getMonday(today);
let state=JSON.parse(JSON.stringify(DEFAULT_STATE));
let uid=100;
let saveTimer=null;
let isEditMode=false;
let currentPw=DEFAULT_PW;

// 비밀번호 Firebase에서 불러오기
onValue(pwRef,(snap)=>{ if(snap.exists()) currentPw=snap.val(); });

function saveToFirebase(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{set(dbRef,state);},600);}
function setSyncStatus(on){document.getElementById('sync-dot').className='sync-dot'+(on?'':' offline');document.getElementById('sync-text').textContent=on?'실시간 동기화 중':'연결 끊김';}

onValue(dbRef,(snapshot)=>{
  setSyncStatus(true);
  if(snapshot.exists()){state=snapshot.val();}
  else{set(dbRef,DEFAULT_STATE);state=JSON.parse(JSON.stringify(DEFAULT_STATE));}
  render();
},()=>{setSyncStatus(false);render();});

// 모드 선택
document.getElementById('btn-view').addEventListener('click',()=>{
  isEditMode=false; showApp();
});
document.getElementById('btn-edit').addEventListener('click',()=>{
  document.getElementById('mode-screen').style.display='none';
  document.getElementById('pw-screen').classList.add('visible');
  document.getElementById('pw-input').focus();
});
document.getElementById('pw-back').addEventListener('click',()=>{
  document.getElementById('pw-screen').classList.remove('visible');
  document.getElementById('pw-error').classList.remove('visible');
  document.getElementById('pw-input').value='';
  document.getElementById('mode-screen').style.display='';
});

function checkPw(){
  const val=document.getElementById('pw-input').value;
  if(val===currentPw){
    isEditMode=true;
    document.getElementById('pw-screen').classList.remove('visible');
    document.getElementById('pw-error').classList.remove('visible');
    document.getElementById('pw-input').value='';
    showApp();
  } else {
    document.getElementById('pw-error').classList.add('visible');
  }
}
document.getElementById('pw-submit').addEventListener('click',checkPw);
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw();});

function showApp(){
  document.getElementById('mode-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
  const badge=document.getElementById('mode-badge');
  if(isEditMode){
    badge.textContent='수정 모드'; badge.className='mode-badge edit';
    document.getElementById('add-client-btn').style.display='';
    document.getElementById('change-pw-btn').style.display='';
  } else {
    badge.textContent='열람 모드'; badge.className='mode-badge view';
    document.getElementById('add-client-btn').style.display='none';
    document.getElementById('change-pw-btn').style.display='none';
  }
  render();
}

document.getElementById('logout-btn').addEventListener('click',()=>{
  isEditMode=false;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('mode-screen').style.display='';
});

// 비밀번호 변경
document.getElementById('change-pw-btn').addEventListener('click',()=>{
  document.getElementById('pw-modal').classList.add('visible');
  document.getElementById('modal-cur').focus();
});
document.getElementById('modal-cancel').addEventListener('click',()=>{
  document.getElementById('pw-modal').classList.remove('visible');
  ['modal-cur','modal-new','modal-confirm'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-err').classList.remove('visible');
});
document.getElementById('modal-save').addEventListener('click',()=>{
  const cur=document.getElementById('modal-cur').value;
  const nw=document.getElementById('modal-new').value;
  const cf=document.getElementById('modal-confirm').value;
  const err=document.getElementById('modal-err');
  if(cur!==currentPw){err.textContent='현재 비밀번호가 틀렸습니다';err.classList.add('visible');return;}
  if(!nw){err.textContent='새 비밀번호를 입력하세요';err.classList.add('visible');return;}
  if(nw!==cf){err.textContent='새 비밀번호가 일치하지 않습니다';err.classList.add('visible');return;}
  set(pwRef,nw).then(()=>{
    currentPw=nw;
    document.getElementById('pw-modal').classList.remove('visible');
    ['modal-cur','modal-new','modal-confirm'].forEach(id=>document.getElementById(id).value='');
    err.classList.remove('visible');
    alert('비밀번호가 변경되었습니다.');
  });
});

function makeMemo(task,dk,type){
  const memoKey=type==='v'?'vmemos':'ymemos';
  if(!task[memoKey])task[memoKey]={};
  const val=task[memoKey][dk]||'';
  const el=document.createElement('textarea');
  el.className='memo-input'+(val?' has-memo':'')+(isEditMode?' editable':'');
  el.placeholder=isEditMode?'메모':'';
  el.value=val;
  el.rows=1;
  el.readOnly=!isEditMode;
  el.addEventListener('input',()=>{
    el.style.height='auto';el.style.height=el.scrollHeight+'px';
    el.className='memo-input'+(el.value?' has-memo':'')+(isEditMode?' editable':'');
  });
  el.addEventListener('change',()=>{if(isEditMode){task[memoKey][dk]=el.value;saveToFirebase();}});
  return el;
}

function render(){
  document.getElementById('week-label').textContent=fmtWeek(weekStart);
  const weekDates=Array.from({length:7},(_,i)=>addDays(weekStart,i));
  const todayKey=dateKey(today);
  const board=document.getElementById('board');
  board.innerHTML='';
  if(!state.clients)state.clients=[];

  state.clients.forEach((client,ci)=>{
    const color=COLORS[ci%COLORS.length];
    const block=document.createElement('div');
    block.className='client-block';

    const hdr=document.createElement('div');
    hdr.className='client-header';
    hdr.innerHTML=`
      <div class="client-name-area">
        <div class="client-dot" style="background:${color};"></div>
        <input class="client-name${isEditMode?' editable':''}" value="${escHtml(client.name)}" ${isEditMode?'':'readonly'} aria-label="클라이언트명" />
      </div>
      <div class="client-actions">
        ${isEditMode?`<button class="small-btn add-task-btn"><i class="ti ti-plus" style="font-size:11px;"></i> 작업 추가</button><button class="del-client-btn"><i class="ti ti-x" style="font-size:12px;"></i></button>`:''}
      </div>`;
    if(isEditMode){
      hdr.querySelector('.client-name').addEventListener('change',e=>{client.name=e.target.value;saveToFirebase();});
      hdr.querySelector('.add-task-btn').addEventListener('click',()=>{
        if(!client.tasks)client.tasks=[];
        client.tasks.push({id:'t'+(uid++),title:'새 작업',vchecks:{},ychecks:{},vmemos:{},ymemos:{}});
        saveToFirebase();render();
      });
      hdr.querySelector('.del-client-btn').addEventListener('click',()=>{
        if(client.tasks&&client.tasks.length>0&&!confirm(`'${client.name}' 삭제?`))return;
        state.clients=state.clients.filter(c=>c.id!==client.id);
        saveToFirebase();render();
      });
    }
    block.appendChild(hdr);

    const ow=document.createElement('div');ow.className='overflow-wrapper';
    const grid=document.createElement('div');grid.className='task-grid';

    const spacer=document.createElement('div');spacer.className='col-header-spacer';spacer.textContent='작업명';
    grid.appendChild(spacer);
    weekDates.forEach((d,di)=>{
      const isToday=dateKey(d)===todayKey;
      const c=document.createElement('div');
      c.className='day-header-cell'+(isToday?' today':'');
      c.innerHTML=`<span class="day-name">${DAYS[di]}</span><span class="day-num">${d.getDate()}</span>`;
      grid.appendChild(c);
    });

    const tasks=client.tasks||[];
    tasks.forEach((task,ti)=>{
      if(!task.vchecks)task.vchecks={};
      if(!task.ychecks)task.ychecks={};
      if(!task.vmemos)task.vmemos={};
      if(!task.ymemos)task.ymemos={};
      const isLastTask=(ti===tasks.length-1);
      const vCount=weekDates.filter(d=>task.vchecks[dateKey(d)]).length;
      const yCount=weekDates.filter(d=>task.ychecks[dateKey(d)]).length;

      const labelCell=document.createElement('div');
      labelCell.className='task-label-cell'+(isLastTask?' last':'');
      labelCell.style.gridRow='span 2';
      labelCell.innerHTML=`
        <div class="task-title-row">
          <input class="task-title-input${isEditMode?' editable':''}" value="${escHtml(task.title)}" ${isEditMode?'':'readonly'} aria-label="작업명" />
          ${isEditMode?'<button class="del-task-btn"><i class="ti ti-x"></i></button>':''}
        </div>
        <div class="sub-badges">
          <span class="badge badge-video${vCount>0?' active':''}">제작 ${vCount}/7</span>
          <span class="badge badge-yt${yCount>0?' active':''}">업로드 ${yCount}/7</span>
        </div>`;
      if(isEditMode){
        labelCell.querySelector('.task-title-input').addEventListener('change',e=>{task.title=e.target.value;saveToFirebase();});
        labelCell.querySelector('.del-task-btn').addEventListener('click',()=>{
          client.tasks=client.tasks.filter(t=>t.id!==task.id);
          saveToFirebase();render();
        });
      }
      grid.appendChild(labelCell);

      weekDates.forEach((d)=>{
        const dk=dateKey(d);const isToday=dk===todayKey;
        const cell=document.createElement('div');
        cell.className='check-cell'+(isToday?' today-col':'');
        const btn=document.createElement('div');
        btn.className='check-icon'+(task.vchecks[dk]?' cv':'')+(isEditMode?' editable':'');
        btn.title='영상제작완료';btn.setAttribute('role','checkbox');
        if(isEditMode){btn.setAttribute('tabindex','0');btn.addEventListener('click',()=>{task.vchecks[dk]=!task.vchecks[dk];saveToFirebase();render();});btn.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter')btn.click();});}
        btn.innerHTML=`<i class="ti ti-check"></i>`;
        cell.appendChild(btn);cell.appendChild(makeMemo(task,dk,'v'));
        grid.appendChild(cell);
      });

      weekDates.forEach((d)=>{
        const dk=dateKey(d);const isToday=dk===todayKey;
        const cell=document.createElement('div');
        cell.className='check-cell'+(isToday?' today-col':'')+(isLastTask?' last':'');
        const btn=document.createElement('div');
        btn.className='check-icon'+(task.ychecks[dk]?' cy':'')+(isEditMode?' editable':'');
        btn.title='유튜브업로드완료';btn.setAttribute('role','checkbox');
        if(isEditMode){btn.setAttribute('tabindex','0');btn.addEventListener('click',()=>{task.ychecks[dk]=!task.ychecks[dk];saveToFirebase();render();});btn.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter')btn.click();});}
        btn.innerHTML=`<i class="ti ti-brand-youtube"></i>`;
        cell.appendChild(btn);cell.appendChild(makeMemo(task,dk,'y'));
        grid.appendChild(cell);
      });
    });

    ow.appendChild(grid);block.appendChild(ow);board.appendChild(block);
  });
}

document.getElementById('prev-btn').addEventListener('click',()=>{weekStart=addDays(weekStart,-7);render();});
document.getElementById('next-btn').addEventListener('click',()=>{weekStart=addDays(weekStart,7);render();});
document.getElementById('add-client-btn').addEventListener('click',()=>{
  if(!state.clients)state.clients=[];
  state.clients.push({id:'c'+(uid++),name:'새 클라이언트',tasks:[{id:'t'+(uid++),title:'새 작업',vchecks:{},ychecks:{},vmemos:{},ymemos:{}}]});
  saveToFirebase();render();
});
</script>
</body>
</html>
